version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dop
      POSTGRES_PASSWORD: dop_secret
      POSTGRES_DB: dop_compliance
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'dop', '-d', 'dop_compliance']
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
